<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Change Password</title>
</head>
<body>
<div layout:fragment="content">

    <h2>Change Password</h2>
    <p>Logged in as: <strong th:text="${loggedInUser.name}"></strong></p>

    <p th:if="${success}" th:text="${success}" style="color:green"></p>
    <p th:if="${error}" th:text="${error}" style="color:red"></p>

    <form th:action="@{/account/changepassword}" method="post">

        <label>Current Password:</label>
        <input type="password" name="currentPassword" required/><br/><br/>

        <label>New Password:</label>
        <input type="password" name="newPassword" required/><br/><br/>

        <label>Confirm New Password:</label>
        <input type="password" name="confirmNewPassword" required/><br/><br/>

        <button type="submit">Change Password</button>
    </form>

    <br/>
    <a href="/account/settings">Back to Settings</a>
    <br/><br/>
    <a href="/dashboard">Back to Dashboard</a>

</div>
</body>
</html>
