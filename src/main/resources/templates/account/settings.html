<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Account Settings</title>
</head>
<body>
<div layout:fragment="content">

    <h2>Account Settings</h2>
    <p>Logged in as: <strong th:text="${loggedInUser.name}"></strong>
        (<span th:text="${loggedInUser.role}"></span>)</p>

    <p th:if="${success}" th:text="${success}" style="color:green"></p>
    <p th:if="${error}" th:text="${error}" style="color:red"></p>

    <form th:action="@{/account/settings}" th:object="${user}" method="post">

        <label>Name:</label>
        <input type="text" th:field="*{name}" required/>
        <span th:if="${#fields.hasErrors('name')}"
              th:errors="*{name}" style="color:red"></span>
        <br/><br/>

        <label>Email:</label>
        <input type="email" th:field="*{email}" required/>
        <span th:if="${#fields.hasErrors('email')}"
              th:errors="*{email}" style="color:red"></span>
        <br/><br/>

        <label>Role:</label>
        <input type="text" th:value="${user.role}" disabled/>
        <input type="hidden" th:field="*{password}"/>
        <br/><br/>

        <button type="submit">Save Changes</button>
    </form>

    <br/>
    <a href="/account/changepassword">Change Password</a>
    <br/><br/>
    <a href="/dashboard">Back to Dashboard</a>

</div>
</body>
</html>
