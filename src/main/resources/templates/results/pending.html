<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Pending Grading</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header mb-3">
        <h2 class="page-title">Pending Grading</h2>
        <p class="text-muted">
            Results waiting for your review and approval.
        </p>
    </div>

    <div th:if="${#lists.isEmpty(pendingResults)}" class="empty">
        <p class="empty-title">All Caught Up! 🎉</p>
        <p class="empty-subtitle text-muted">
            No results pending review.
        </p>
    </div>

    <div class="card" th:unless="${#lists.isEmpty(pendingResults)}">
        <div class="card-body p-0">
            <table class="table table-vcenter card-table">
                <thead>
                <tr>
                    <th>Student</th>
                    <th>Exam</th>
                    <th>Score</th>
                    <th>%</th>
                    <th>Submitted At</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="result : ${pendingResults}">
                    <td th:text="${result.student.name}"></td>
                    <td th:text="${result.exam.title}"></td>
                    <td th:text="${result.totalScore} + '/' +
                            ${result.totalMarks}"></td>
                    <td th:text="${result.percentage} + '%'"></td>
                    <td class="text-muted"
                        th:text="${result.attempt.submittedAt}">
                    </td>
                    <td>
                        <a th:href="@{/results/grade/{id}
                                (id=${result.id})}"
                           class="btn btn-sm btn-primary">
                            Grade
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-3">
        <a href="/dashboard"
           class="btn btn-outline-secondary">← Dashboard</a>
    </div>
</div>
</body>
</html>
