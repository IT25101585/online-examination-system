<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Result Pending</title></head>
<body>
<div layout:fragment="content">
    <div class="empty">
        <div class="empty-img" style="font-size:4rem;">⏳</div>
        <p class="empty-title">Result Pending Teacher Review</p>
        <p class="empty-subtitle text-muted">
            Your exam has been submitted and automatically scored.
            Your teacher will review each question and answer
            individually before releasing your result.
            Check back later!
        </p>
        <div class="empty-action">
            <a href="/history/student"
               class="btn btn-outline-primary me-2">
                My Exam History
            </a>
            <a href="/dashboard" class="btn btn-primary">
                Back to Dashboard
            </a>
        </div>
    </div>
</div>
</body>
</html>
