<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Grade Result</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header mb-3">
        <h2 class="page-title">Review &amp; Grade</h2>
    </div>

    <div class="row row-cards mb-3">
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <div class="subheader">Student</div>
                    <div class="h3 mt-1"
                         th:text="${result.student.name}"></div>
                    <div class="text-muted small"
                         th:text="${result.student.email}"></div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <div class="subheader">Exam</div>
                    <div class="h3 mt-1"
                         th:text="${result.exam.title}"></div>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card">
                <div class="card-body">
                    <div class="subheader">Auto Score</div>
                    <div class="h1 mt-1 text-success"
                         th:text="${result.totalScore} + '/' +
                             ${result.totalMarks}"></div>
                    <div class="text-muted small"
                         th:text="${result.percentage} + '% — ' +
                             ${result.grade}"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-3"
         th:if="${sessionQuestions != null and
             !#lists.isEmpty(sessionQuestions)}">
        <div class="card-header">
            <h3 class="card-title">Student Answers</h3>
        </div>
        <div class="card-body p-0">
            <div th:each="q, i : ${sessionQuestions}"
                 class="border-bottom p-3">
                <p class="mb-2">
                    <strong th:text="${i.count} + '. ' +
                        ${q.questionText}"></strong>
                    <span class="badge bg-blue-lt ms-2"
                          th:text="${q.questionType}"></span>
                    <span class="text-muted ms-2 small">
                        (<span th:text="${q.marks}"></span> marks)
                    </span>
                </p>
                <div th:if="${q.questionType.name() == 'MCQ'}"
                     class="text-muted small ps-3 mb-2">
                    <div>A: <span th:text="${q.optionA}"></span></div>
                    <div>B: <span th:text="${q.optionB}"></span></div>
                    <div>C: <span th:text="${q.optionC}"></span></div>
                    <div>D: <span th:text="${q.optionD}"></span></div>
                </div>
                <p class="text-success small mb-0">
                    ✓ Correct Answer:
                    <strong th:text="${q.correctAnswer}"></strong>
                </p>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h3 class="card-title">Approve Result</h3>
        </div>
        <div class="card-body">
            <form th:action="@{/results/approve/{id}(id=${result.id})}"
                  method="post">
                <div class="mb-3">
                    <label class="form-label">
                        Override Score (optional)
                    </label>
                    <input type="number" name="overriddenScore"
                           class="form-control"
                           th:placeholder="${result.totalScore}"
                           min="0"
                           th:max="${result.totalMarks}"/>
                    <div class="form-hint">
                        Auto score:
                        <strong th:text="${result.totalScore}"></strong>
                        /
                        <strong th:text="${result.totalMarks}"></strong>.
                        Leave blank to keep it.
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">
                        Teacher Note (optional)
                    </label>
                    <textarea name="teacherNote" class="form-control"
                              rows="3"
                              placeholder="Feedback for the student...">
                    </textarea>
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-success">
                        ✅ Approve &amp; Release Result
                    </button>
                    <a href="/results/pending"
                       class="btn btn-outline-secondary">
                        ← Back to Pending
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
