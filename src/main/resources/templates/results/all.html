<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Results</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header mb-3">
        <div class="row align-items-center">
            <div class="col">
                <h2 class="page-title">Results</h2>
                <p class="text-muted mb-0">
                    Exam: <strong th:text="${exam.title}"></strong>
                </p>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(results)}" class="empty">
        <p class="empty-title">No Results Yet</p>
        <p class="empty-subtitle text-muted">
            No students have completed this exam yet.
        </p>
    </div>

    <div class="card" th:unless="${#lists.isEmpty(results)}">
        <div class="card-body p-0">
            <table class="table table-vcenter card-table">
                <thead>
                <tr>
                    <th>Student</th>
                    <th>Score</th>
                    <th>%</th>
                    <th>Grade</th>
                    <th>Result</th>
                    <th>Approved</th>
                    <th>Date</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="result : ${results}">
                    <td th:text="${result.student.name}"></td>
                    <td th:text="${result.totalScore} + '/' +
                            ${result.totalMarks}"></td>
                    <td th:text="${result.percentage} + '%'"></td>
                    <td><strong th:text="${result.grade}"></strong>
                    </td>
                    <td>
                            <span class="badge bg-success-lt"
                                  th:if="${result.passed}">PASSED</span>
                        <span class="badge bg-danger-lt"
                              th:unless="${result.passed}">FAILED</span>
                    </td>
                    <td>
                            <span class="badge bg-success-lt"
                                  th:if="${result.teacherApproved}">
                                Approved
                            </span>
                        <span class="badge bg-warning-lt"
                              th:unless="${result.teacherApproved}">
                                Pending
                            </span>
                    </td>
                    <td class="text-muted"
                        th:text="${result.calculatedAt}"></td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="mt-3">
        <a th:href="@{/exams/{id}(id=${exam.id})}"
           class="btn btn-outline-secondary">← Back to Exam</a>
    </div>
</div>
</body>
</html>
