<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Create Session</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header mb-3">
        <h2 class="page-title">Create Exam Session</h2>
        <p class="text-muted">
            Exam: <strong th:text="${exam.title}"></strong>
            &nbsp;·&nbsp;
            Duration: <strong th:text="${exam.durationMins}
                + ' minutes'"></strong>
        </p>
    </div>
    <div class="row">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body">
                    <div th:if="${error}"
                         class="alert alert-danger mb-3"
                         th:text="${error}"></div>
                    <form th:action="@{/sessions/create/{examId}
                              (examId=${exam.id})}" method="post">
                        <div class="mb-3">
                            <label class="form-label">
                                Session Label (optional)
                            </label>
                            <input type="text" name="label"
                                   class="form-control"
                                   placeholder="e.g. Morning Session"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">
                                Start Date &amp; Time
                            </label>
                            <input type="datetime-local"
                                   name="startTime"
                                   class="form-control" required/>
                            <div class="form-hint">
                                Session ends automatically after
                                <strong th:text="${exam.durationMins}">
                                </strong> minutes.
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                Create &amp; Preview Questions
                            </button>
                            <a th:href="@{/sessions/exam/{examId}
                                (examId=${exam.id})}"
                               class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
