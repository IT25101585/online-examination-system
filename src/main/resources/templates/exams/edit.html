<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Exam</title>
</head>
<body>

<h2>Edit Exam</h2>

<form th:action="@{/exams/edit/{id}(id=${exam.id})}" th:object="${exam}" method="post">

    <label>Title:</label>
    <input type="text" th:field="*{title}" required/>
    <span th:if="${#fields.hasErrors('title')}" th:errors="*{title}" style="color:red"></span>
    <br/><br/>

    <label>Description:</label>
    <textarea th:field="*{description}" rows="4" cols="40"></textarea>
    <br/><br/>

    <label>Duration (minutes):</label>
    <input type="number" th:field="*{durationMins}" min="1" required/>
    <span th:if="${#fields.hasErrors('durationMins')}" th:errors="*{durationMins}" style="color:red"></span>
    <br/><br/>

    <label>Total Marks:</label>
    <input type="number" th:field="*{totalMarks}" min="1" required/>
    <span th:if="${#fields.hasErrors('totalMarks')}" th:errors="*{totalMarks}" style="color:red"></span>
    <br/><br/>

    <button type="submit">Save Changes</button>
</form>

<br/>
<a href="/exams">Back to Exams</a>

</body>
</html>
