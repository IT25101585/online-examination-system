<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Edit Exam</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header mb-3">
        <h2 class="page-title">Edit Exam</h2>
    </div>
    <div class="row">
        <div class="col-md-9">
            <div class="card">
                <div class="card-body">
                    <form th:action="@{/exams/edit/{id}(id=${exam.id})}"
                          th:object="${exam}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Title</label>
                            <input type="text" th:field="*{title}"
                                   class="form-control" required/>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Description</label>
                            <textarea th:field="*{description}"
                                      class="form-control"
                                      rows="3"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Module</label>
                            <select name="moduleId" class="form-select">
                                <option value="">-- No Module --</option>
                                <option th:each="m : ${modules}"
                                        th:value="${m.id}"
                                        th:text="${m.name}"
                                        th:selected="${exam.module != null
                                            and exam.module.id == m.id}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Duration (minutes)
                            </label>
                            <input type="number"
                                   th:field="*{durationMins}"
                                   class="form-control"
                                   min="1" required/>
                        </div>

                        <hr/>
                        <h4 class="mb-1">
                            Question Selection &amp; Marks
                        </h4>
                        <p class="text-muted small mb-3">
                            Adjust counts and marks per question.
                            Decimals allowed. Total updates live.
                        </p>

                        <table class="table table-bordered mb-2">
                            <thead class="table-light">
                            <tr>
                                <th>Type</th>
                                <th>Count</th>
                                <th>Marks Each</th>
                                <th>Subtotal</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr>
                                <td class="align-middle">
                                        <span class="badge bg-blue-lt">
                                            MCQ
                                        </span>
                                </td>
                                <td>
                                    <input type="number"
                                           name="mcqCount"
                                           id="mcqCount"
                                           class="form-control"
                                           min="0" step="1"
                                           th:value="${exam.mcqCount
                                                   != null ?
                                                   exam.mcqCount : 0}"/>
                                </td>
                                <td>
                                    <input type="number"
                                           name="mcqMarksEach"
                                           id="mcqMarks"
                                           class="form-control"
                                           min="0" step="0.5"
                                           th:value="${exam.mcqMarksEach
                                                   != null ?
                                                   exam.mcqMarksEach
                                                   : 1}"/>
                                </td>
                                <td class="align-middle fw-bold"
                                    id="mcqSubtotal">—</td>
                            </tr>
                            <tr>
                                <td class="align-middle">
                                        <span class="badge bg-green-lt">
                                            True/False
                                        </span>
                                </td>
                                <td>
                                    <input type="number"
                                           name="trueFalseCount"
                                           id="tfCount"
                                           class="form-control"
                                           min="0" step="1"
                                           th:value="${exam.trueFalseCount
                                                   != null ?
                                                   exam.trueFalseCount
                                                   : 0}"/>
                                </td>
                                <td>
                                    <input type="number"
                                           name="tfMarksEach"
                                           id="tfMarks"
                                           class="form-control"
                                           min="0" step="0.5"
                                           th:value="${exam.tfMarksEach
                                                   != null ?
                                                   exam.tfMarksEach
                                                   : 1}"/>
                                </td>
                                <td class="align-middle fw-bold"
                                    id="tfSubtotal">—</td>
                            </tr>
                            <tr>
                                <td class="align-middle">
                                        <span class="badge bg-purple-lt">
                                            Short Answer
                                        </span>
                                </td>
                                <td>
                                    <input type="number"
                                           name="shortAnswerCount"
                                           id="saCount"
                                           class="form-control"
                                           min="0" step="1"
                                           th:value="${exam.shortAnswerCount
                                                   != null ?
                                                   exam.shortAnswerCount
                                                   : 0}"/>
                                </td>
                                <td>
                                    <input type="number"
                                           name="saMarksEach"
                                           id="saMarks"
                                           class="form-control"
                                           min="0" step="0.5"
                                           th:value="${exam.saMarksEach
                                                   != null ?
                                                   exam.saMarksEach
                                                   : 2}"/>
                                </td>
                                <td class="align-middle fw-bold"
                                    id="saSubtotal">—</td>
                            </tr>
                            <tr class="table-light">
                                <td colspan="3"
                                    class="text-end fw-bold pe-3">
                                    Total Marks
                                </td>
                                <td class="fw-bold text-primary fs-4"
                                    id="grandTotal"
                                    th:text="${exam.totalMarks}">
                                </td>
                            </tr>
                            </tbody>
                        </table>

                        <input type="hidden"
                               id="totalMarksHidden"
                               name="totalMarks"
                               th:value="${exam.totalMarks}"/>

                        <div class="d-flex gap-2 mt-3">
                            <button type="submit"
                                    class="btn btn-primary">
                                Save Changes
                            </button>
                            <a href="/exams"
                               class="btn btn-outline-secondary">
                                Cancel
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
