<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title layout:title-pattern="$LAYOUT_TITLE - Exam System">
        Exam System
    </title>
    <!-- Tabler CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/css/tabler.min.css"/>
    <!-- our custom overrides -->
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body class="antialiased">

<!-- tabler navbar -->
<header class="navbar navbar-expand-md navbar-light d-print-none">
    <div class="container-xl">
        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbar-menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <h1 class="navbar-brand navbar-brand-autodark d-none-navbar-horizontal pe-0 pe-md-3">
            <a href="/dashboard">
                📝 Exam System
            </a>
        </h1>
        <div class="navbar-nav flex-row order-md-last">
            <div class="nav-item dropdown">
                <a href="#" class="nav-link d-flex lh-1 text-reset p-0"
                   data-bs-toggle="dropdown">
                    <div class="d-none d-xl-block ps-2">
                        <div th:text="${loggedInUser != null ?
                                loggedInUser.name : ''}"></div>
                        <div class="mt-1 small text-muted"
                             th:text="${loggedInUser != null ?
                                 loggedInUser.role : ''}"></div>
                    </div>
                </a>
                <div class="dropdown-menu dropdown-menu-end
                                dropdown-menu-arrow">
                    <a href="/account/settings"
                       class="dropdown-item">⚙️ Settings</a>
                    <a href="/users/logout"
                       class="dropdown-item">🚪 Logout</a>
                </div>
            </div>
        </div>
        <div class="collapse navbar-collapse" id="navbar-menu">
            <div class="d-flex flex-column flex-md-row flex-fill
                            align-items-stretch align-items-md-center">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">
                                <span class="nav-link-icon d-md-none
                                             d-lg-inline-block">
                                    🏠
                                </span>
                            <span class="nav-link-title">Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item"
                        th:if="${loggedInUser != null and
                                loggedInUser.role.name() != 'STUDENT'}">
                        <a class="nav-link" href="/exams">
                                <span class="nav-link-icon d-md-none
                                             d-lg-inline-block">📋</span>
                            <span class="nav-link-title">Exams</span>
                        </a>
                    </li>
                    <li class="nav-item"
                        th:if="${loggedInUser != null and
                                loggedInUser.role.name() == 'TEACHER'}">
                        <a class="nav-link" href="/questions/bank">
                                <span class="nav-link-icon d-md-none
                                             d-lg-inline-block">📝</span>
                            <span class="nav-link-title">
                                    Question Bank
                                </span>
                        </a>
                    </li>
                    <li class="nav-item"
                        th:if="${loggedInUser != null and
                                loggedInUser.role.name() != 'STUDENT'}">
                        <a class="nav-link" href="/sessions">
                                <span class="nav-link-icon d-md-none
                                             d-lg-inline-block">📅</span>
                            <span class="nav-link-title">Sessions</span>
                        </a>
                    </li>
                    <li class="nav-item"
                        th:if="${loggedInUser != null and
                                loggedInUser.role.name() == 'ADMIN'}">
                        <a class="nav-link" href="/users/all">
                                <span class="nav-link-icon d-md-none
                                             d-lg-inline-block">👥</span>
                            <span class="nav-link-title">Users</span>
                        </a>
                    </li>
                    <li class="nav-item"
                        th:if="${loggedInUser != null and
                                loggedInUser.role.name() == 'ADMIN'}">
                        <a class="nav-link" href="/modules">
                                <span class="nav-link-icon d-md-none
                                             d-lg-inline-block">📚</span>
                            <span class="nav-link-title">Modules</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </div>
</header>

<div class="page-wrapper">
    <div class="page-body">
        <div class="container-xl">
            <div layout:fragment="content"></div>
        </div>
    </div>
</div>

<!-- Tabler JS -->
<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.0.0-beta17/dist/js/tabler.min.js"></script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
