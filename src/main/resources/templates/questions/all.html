<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>Questions</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header mb-3">
        <div class="row align-items-center">
            <div class="col">
                <h2 class="page-title">Question Bank</h2>
                <p class="text-muted mb-0">
                    Module: <strong th:text="${module.name}"></strong>
                    &nbsp;·&nbsp;
                    <strong th:text="${questionCount}"></strong> questions
                </p>
            </div>
            <div class="col-auto">
                <a th:href="@{/questions/create/{id}(id=${module.id})}"
                   class="btn btn-primary">+ Add Question</a>
                <a href="/questions/bank"
                   class="btn btn-outline-secondary ms-2">
                    ← All Modules
                </a>
            </div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(questions)}" class="empty">
        <p class="empty-title">No Questions Yet</p>
        <p class="empty-subtitle text-muted">
            Add questions to this module's question bank.
        </p>
        <div class="empty-action">
            <a th:href="@{/questions/create/{id}(id=${module.id})}"
               class="btn btn-primary">Add First Question</a>
        </div>
    </div>

    <div class="card" th:unless="${#lists.isEmpty(questions)}">
        <div class="card-body p-0">
            <table class="table table-vcenter card-table">
                <thead>
                <tr>
                    <th>#</th>
                    <th>Question</th>
                    <th>Type</th>
                    <th>Marks</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="question, i : ${questions}">
                    <td th:text="${i.count}"></td>
                    <td th:text="${question.questionText}"></td>
                    <td>
                            <span class="badge bg-blue-lt"
                                  th:if="${question.questionType.name()
                                      == 'MCQ'}">MCQ</span>
                        <span class="badge bg-green-lt"
                              th:if="${question.questionType.name()
                                      == 'TRUE_FALSE'}">T/F</span>
                        <span class="badge bg-purple-lt"
                              th:if="${question.questionType.name()
                                      == 'SHORT_ANSWER'}">Short</span>
                    </td>
                    <td th:text="${question.marks}"></td>
                    <td>
                        <a th:href="@{/questions/edit/{id}
                                (id=${question.id})}"
                           class="btn btn-sm
                                      btn-outline-primary me-1">
                            Edit
                        </a>
                        <a th:href="@{/questions/delete/{id}
                                (id=${question.id})}"
                           onclick="return confirm(
                                   'Delete this question?')"
                           class="btn btn-sm btn-outline-danger">
                            Delete
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
