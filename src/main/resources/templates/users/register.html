<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Register</title>
</head>
<body>
<div layout:fragment="content">

    <h2>Create Account</h2>

    <form th:action="@{/users/register}" th:object="${user}" method="post">

        <label>Name:</label>
        <input type="text" th:field="*{name}" required/>
        <span th:if="${#fields.hasErrors('name')}"
              th:errors="*{name}" style="color:red"></span>
        <br/><br/>

        <label>Email:</label>
        <input type="email" th:field="*{email}" required/>
        <span th:if="${#fields.hasErrors('email')}"
              th:errors="*{email}" style="color:red"></span>
        <br/><br/>

        <label>Password:</label>
        <input type="password" th:field="*{password}" required/>
        <span th:if="${#fields.hasErrors('password')}"
              th:errors="*{password}" style="color:red"></span>
        <br/><br/>

        <label>Confirm Password:</label>
        <input type="password" th:field="*{confirmPassword}" required/>
        <br/><br/>

        <label>Role:</label>
        <select th:field="*{role}">
            <option th:each="role : ${roles}"
                    th:value="${role}"
                    th:text="${role}">
            </option>
        </select><br/><br/>

        <button type="submit">Register</button>
    </form>

    <p th:if="${error}" th:text="${error}" style="color:red"></p>
    <a href="/users/login">Already have an account? Login here</a>

</div>
</body>
</html>
