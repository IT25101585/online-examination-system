<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head>
    <title>Edit Profile</title>
</head>
<body>
<div layout:fragment="content">

    <h2>Edit Profile</h2>

    <form th:action="@{/users/edit/{id}(id=${user.id})}"
          th:object="${user}" method="post">

        <label>Name:</label>
        <input type="text" th:field="*{name}" required/><br/><br/>

        <label>Email:</label>
        <input type="email" th:field="*{email}" required/><br/><br/>

        <label>Password:</label>
        <input type="password" th:field="*{password}" required/><br/><br/>

        <label>Role:</label>
        <select th:field="*{role}" th:if="${isAdmin}">
            <option th:each="role : ${roles}"
                    th:value="${role}"
                    th:text="${role}">
            </option>
        </select>
        <input type="text" th:unless="${isAdmin}"
               th:value="${user.role}" disabled/>
        <input type="hidden" th:unless="${isAdmin}"
               th:field="*{role}"/>
        <br/><br/>

        <button type="submit">Save Changes</button>
    </form>

    <p th:if="${error}" th:text="${error}" style="color:red"></p>
    <a th:href="@{/users/profile/{id}(id=${user.id})}">Cancel</a>

</div>
</body>
</html>
