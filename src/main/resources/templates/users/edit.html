<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Profile</title>
</head>
<body>

<h2>Edit Profile</h2>

<form th:action="@{/users/edit/{id}(id=${user.id})}" th:object="${user}" method="post">

    <label>Name:</label>
    <input type="text" th:field="*{name}" required/><br/><br/>

    <label>Email:</label>
    <input type="email" th:field="*{email}" required/><br/><br/>

    <label>Password:</label>
    <input type="password" th:field="*{password}" required/><br/><br/>

    <label>Role:</label>
    <select th:field="*{role}">
        <option th:each="role : ${roles}"
                th:value="${role}"
                th:text="${role}">
        </option>
    </select><br/><br/>

    <button type="submit">Save Changes</button>
</form>

<p th:if="${error}" th:text="${error}" style="color:red"></p>

<a th:href="@{/users/profile/{id}(id=${user.id})}">Cancel</a>

</body>
</html>
