<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/base}">
<head><title>All Users</title></head>
<body>
<div layout:fragment="content">
    <div class="page-header mb-3">
        <div class="row align-items-center">
            <div class="col">
                <h2 class="page-title">All Users</h2>
            </div>
            <div class="col-auto">
                <a href="/users/register" class="btn btn-primary">
                    + Add New User
                </a>
            </div>
        </div>
    </div>

    <!-- success message after delete -->
    <div th:if="${deletedUser}"
         class="alert alert-success alert-dismissible mb-3">
        User <strong th:text="${deletedUser}"></strong>
        has been deleted.
        <button type="button" class="btn-close"
                data-bs-dismiss="alert"></button>
    </div>

    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-vcenter card-table">
                    <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Member Since</th>
                        <th>Last Login</th>
                        <th>Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(users)}">
                        <td colspan="6"
                            class="text-center text-muted py-4">
                            No users found.
                        </td>
                    </tr>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.name}"></td>
                        <td class="text-muted"
                            th:text="${user.email}"></td>
                        <td>
                                <span class="badge bg-blue-lt"
                                      th:if="${user.role.name() == 'ADMIN'}"
                                      th:text="${user.role}"></span>
                            <span class="badge bg-green-lt"
                                  th:if="${user.role.name() == 'TEACHER'}"
                                  th:text="${user.role}"></span>
                            <span class="badge bg-purple-lt"
                                  th:if="${user.role.name() == 'STUDENT'}"
                                  th:text="${user.role}"></span>
                        </td>
                        <td class="text-muted"
                            th:text="${user.createdAt}"></td>
                        <td class="text-muted">
                                <span th:if="${user.lastLogin != null}"
                                      th:text="${user.lastLogin}"></span>
                            <span th:if="${user.lastLogin == null}"
                                  class="text-muted">Never</span>
                        </td>
                        <td>
                            <a th:if="${user.id == loggedInUser.id}"
                               th:href="@{/users/profile/{id}
                                       (id=${user.id})}"
                               class="btn btn-sm btn-outline-primary me-1">
                                My Profile
                            </a>
                            <a th:unless="${user.id == loggedInUser.id}"
                               th:href="@{/users/view/{id}
                                       (id=${user.id})}"
                               class="btn btn-sm btn-outline-secondary me-1">
                                View
                            </a>
                            <a th:unless="${user.id == loggedInUser.id}"
                               th:href="@{/users/delete/{id}
                                       (id=${user.id})}"
                               onclick="return confirm('Delete this user?')"
                               class="btn btn-sm btn-outline-danger">
                                Delete
                            </a>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
